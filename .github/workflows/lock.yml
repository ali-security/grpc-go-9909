name: Lock Threads

on:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  lock:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: dessant/lock-threads@v5
        with:
          github-token: ${{ github.token }}
          issue-inactive-days: 180
          pr-inactive-days: 180
